{% extends "base.html" %}

{% block content %}
<h1 class="page-title">File Browser</h1>

<div class="card">
    <div class="card-header">
        <div class="d-flex gap-2 flex-wrap" id="project-buttons">
            {% for key, proj in projects.items() %}
            <button class="btn btn-sm btn-outline-secondary"
                    onclick="loadProject('{{ proj.path }}', '{{ proj.name }}', this)">
                <i class="bi bi-folder2"></i> {{ proj.name }}
            </button>
            {% endfor %}
        </div>
    </div>
    <div class="card-body">
        <div id="tree-status" class="text-muted" style="font-size:0.82rem">
            Select a project above to browse its files.
        </div>
        <div id="tree-container" class="file-tree mt-2"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let activeBtn = null;

async function loadProject(path, name, btn) {
    const container = document.getElementById('tree-container');
    const status = document.getElementById('tree-status');

    // Toggle active button style
    if (activeBtn) activeBtn.classList.replace('btn-secondary', 'btn-outline-secondary');
    btn.classList.replace('btn-outline-secondary', 'btn-secondary');
    activeBtn = btn;

    status.textContent = 'Loading ' + name + '…';
    container.innerHTML = '';

    try {
        const res = await fetch('/api/files?path=' + encodeURIComponent(path));
        if (!res.ok) { status.textContent = 'Error: ' + res.statusText; return; }
        const tree = await res.json();
        status.textContent = '';
        renderNode(tree, container, 0);
    } catch (err) {
        status.textContent = 'Failed: ' + err.message;
    }
}

function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = {
        py: 'bi-filetype-py', js: 'bi-filetype-js', ts: 'bi-filetype-tsx',
        html: 'bi-filetype-html', css: 'bi-filetype-css',
        json: 'bi-filetype-json', md: 'bi-filetype-md',
        txt: 'bi-file-text', log: 'bi-file-text',
        sql: 'bi-file-earmark-code', env: 'bi-file-lock',
        parquet: 'bi-file-earmark-zip', csv: 'bi-filetype-csv',
        yml: 'bi-file-earmark-code', yaml: 'bi-file-earmark-code',
        toml: 'bi-file-earmark-code', cfg: 'bi-file-earmark-code',
        sh: 'bi-terminal',
    };
    return 'bi ' + (icons[ext] || 'bi-file-earmark');
}

function renderNode(node, container, depth) {
    if (!node) return;

    const row = document.createElement('div');

    if (node.type === 'dir') {
        row.className = 'tree-row tree-dir';

        const chevron = document.createElement('i');
        chevron.className = 'bi bi-chevron-right tree-chevron';

        const icon = document.createElement('i');
        icon.className = 'bi bi-folder2';

        const name = document.createElement('span');
        name.className = 'tree-name';
        name.textContent = node.name;

        if (node.truncated) {
            const hint = document.createElement('span');
            hint.className = 'tree-meta';
            hint.textContent = '(depth limit)';
            row.appendChild(chevron);
            row.appendChild(icon);
            row.appendChild(name);
            row.appendChild(hint);
            row.style.opacity = '0.5';
            container.appendChild(row);
            return;
        }

        row.appendChild(chevron);
        row.appendChild(icon);
        row.appendChild(name);

        const children = document.createElement('div');
        children.className = 'tree-children';
        children.style.display = depth < 1 ? 'block' : 'none';
        if (depth < 1) {
            chevron.style.transform = 'rotate(90deg)';
            icon.className = 'bi bi-folder2-open';
        }

        if (node.children && node.children.length > 0) {
            for (const child of node.children) {
                renderNode(child, children, depth + 1);
            }
        } else {
            const empty = document.createElement('div');
            empty.className = 'tree-row';
            empty.style.color = '#94a3b8';
            empty.textContent = '(empty)';
            children.appendChild(empty);
        }

        row.addEventListener('click', () => {
            const open = children.style.display !== 'none';
            children.style.display = open ? 'none' : 'block';
            chevron.style.transform = open ? '' : 'rotate(90deg)';
            icon.className = open ? 'bi bi-folder2' : 'bi bi-folder2-open';
        });

        container.appendChild(row);
        container.appendChild(children);

    } else {
        row.className = 'tree-row tree-file';

        const icon = document.createElement('i');
        icon.className = fileIcon(node.name);

        const name = document.createElement('span');
        name.className = 'tree-name';
        name.textContent = node.name;

        const meta = document.createElement('span');
        meta.className = 'tree-meta';
        meta.textContent = node.size + (node.modified ? '  ·  ' + node.modified : '');

        row.appendChild(icon);
        row.appendChild(name);
        row.appendChild(meta);
        container.appendChild(row);
    }
}
</script>
{% endblock %}
