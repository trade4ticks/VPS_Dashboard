{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-baseline justify-content-between mb-3">
    <h1 class="page-title mb-0">Disk Usage</h1>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadDisk()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
</div>

<!-- Volume usage cards -->
<div id="volume-cards">
    <div class="text-muted">Loading…</div>
</div>

<!-- Per-path breakdown -->
<div id="path-sections">
    <div class="text-muted">Loading…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadDisk() {
    document.getElementById('volume-cards').innerHTML = '<div class="text-muted">Loading…</div>';
    document.getElementById('path-sections').innerHTML = '<div class="text-muted">Loading…</div>';

    try {
        const res  = await fetch('/api/disk');
        const data = await res.json();

        // Render volume usage cards
        const volContainer = document.getElementById('volume-cards');
        if (data.volumes && data.volumes.length) {
            let volHtml = '<div class="row g-3 mb-4">';
            for (const v of data.volumes) {
                if (!v.available) {
                    volHtml += `
                    <div class="col-md-6">
                        <div class="section-header">${v.label}</div>
                        <div class="card"><div class="card-body text-muted">Unavailable: <code>${v.mount}</code></div></div>
                    </div>`;
                    continue;
                }
                const pct = parseInt(v.use_pct) || 0;
                const barColor = pct >= 90 ? '#dc3545' : pct >= 70 ? '#fd7e14' : '#198754';
                volHtml += `
                <div class="col-md-6">
                    <div class="section-header">${v.label}</div>
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-1" style="font-size:0.82rem">
                                <span><code>${v.device}</code> → <code>${v.mount}</code></span>
                                <span class="fw-semibold">${v.use_pct} used</span>
                            </div>
                            <div class="progress mb-2" style="height:20px">
                                <div class="progress-bar" role="progressbar"
                                     style="width:${pct}%;background-color:${barColor}"
                                     aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
                                </div>
                            </div>
                            <div class="d-flex justify-content-between text-muted" style="font-size:0.78rem">
                                <span>Used: ${v.used}</span>
                                <span>Available: ${v.avail}</span>
                                <span>Total: ${v.size}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }
            volHtml += '</div>';
            volContainer.innerHTML = volHtml;
        } else {
            volContainer.innerHTML = '<div class="text-muted">No volumes configured.</div>';
        }

        const container = document.getElementById('path-sections');
        if (!data.sections || data.sections.length === 0) {
            container.innerHTML = '<div class="text-muted">No disk paths configured.</div>';
            return;
        }

        let html = '';
        for (const sec of data.sections) {
            html += `<div class="section-header">${sec.label}</div>`;
            if (!sec.exists) {
                html += `<div class="card mb-4"><div class="card-body text-muted">Path not found: <code>${sec.path}</code></div></div>`;
                continue;
            }

            const maxBytes = sec.subdirs.length
                ? Math.max(...sec.subdirs.map(d => d.size_bytes))
                : 1;

            let rows = '';
            for (const dir of sec.subdirs) {
                const pct = maxBytes > 0 ? Math.round((dir.size_bytes / maxBytes) * 100) : 0;
                rows += `
                <tr>
                    <td style="font-family:monospace;font-size:0.82rem">${dir.name}</td>
                    <td style="width:35%">
                        <div class="subdir-bar"><div class="subdir-bar-fill" style="width:${pct}%"></div></div>
                    </td>
                    <td class="text-end" style="font-size:0.82rem;white-space:nowrap">${dir.size}</td>
                    <td class="text-end text-muted" style="font-size:0.78rem">${dir.files} files</td>
                </tr>`;
            }

            html += `
            <div class="card mb-4">
                <div class="card-header">
                    <span><code style="font-size:0.78rem">${sec.path}</code></span>
                    <span class="text-muted" style="font-size:0.78rem">${sec.total_size} &nbsp;·&nbsp; ${sec.total_files} files</span>
                </div>
                <div class="card-body p-0">
                    ${rows.length ? `
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Folder</th>
                                <th>Size</th>
                                <th class="text-end">Total</th>
                                <th class="text-end">Files</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>` : '<div class="px-3 py-3 text-muted">Directory is empty.</div>'}
                </div>
            </div>`;
        }
        container.innerHTML = html;
    } catch (err) {
        document.getElementById('path-sections').innerHTML =
            `<div class="text-danger">Failed to load: ${err.message}</div>`;
    }
}

loadDisk();
</script>
{% endblock %}
