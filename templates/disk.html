{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-baseline justify-content-between mb-3">
    <h1 class="page-title mb-0">Disk Usage</h1>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadDisk()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
</div>

<!-- Volume usage cards -->
<div id="volume-cards">
    <div class="text-muted">Loading…</div>
</div>

<!-- Per-path breakdown -->
<div id="path-sections">
    <div class="text-muted">Loading…</div>
</div>

<!-- PostgreSQL database/table sizes -->
<div id="postgres-section">
    <div class="text-muted">Loading…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
let collapseCounter = 0;

function collapsible(headerHtml, bodyHtml) {
    const id = `collapse-${collapseCounter++}`;
    return `
    <div class="card mb-4">
        <div class="card-header d-flex align-items-center" style="cursor:pointer"
             data-bs-toggle="collapse" data-bs-target="#${id}" aria-expanded="false">
            <i class="bi bi-chevron-right me-2 collapse-chevron"></i>
            <div class="d-flex justify-content-between align-items-center flex-grow-1">
                ${headerHtml}
            </div>
        </div>
        <div id="${id}" class="collapse">
            <div class="card-body p-0">${bodyHtml}</div>
        </div>
    </div>`;
}

async function loadDisk() {
    collapseCounter = 0;
    document.getElementById('volume-cards').innerHTML = '<div class="text-muted">Loading…</div>';
    document.getElementById('path-sections').innerHTML = '<div class="text-muted">Loading…</div>';
    document.getElementById('postgres-section').innerHTML = '<div class="text-muted">Loading…</div>';

    try {
        const res  = await fetch('/api/disk');
        const data = await res.json();

        // Render volume usage cards
        const volContainer = document.getElementById('volume-cards');
        if (data.volumes && data.volumes.length) {
            let volHtml = '<div class="row g-3 mb-4">';
            for (const v of data.volumes) {
                if (!v.available) {
                    volHtml += `
                    <div class="col-md-4">
                        <div class="section-header">${v.label}</div>
                        <div class="card"><div class="card-body text-muted">Unavailable: <code>${v.mount}</code></div></div>
                    </div>`;
                    continue;
                }
                const pct = parseInt(v.use_pct) || 0;
                const barColor = pct >= 90 ? '#dc3545' : pct >= 70 ? '#fd7e14' : '#198754';
                volHtml += `
                <div class="col-md-4">
                    <div class="section-header">${v.label}</div>
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-1" style="font-size:0.82rem">
                                <span><code>${v.device}</code> → <code>${v.mount}</code></span>
                                <span class="fw-semibold">${v.use_pct} used</span>
                            </div>
                            <div class="progress mb-2" style="height:20px">
                                <div class="progress-bar" role="progressbar"
                                     style="width:${pct}%;background-color:${barColor}"
                                     aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
                                </div>
                            </div>
                            <div class="d-flex justify-content-between text-muted" style="font-size:0.78rem">
                                <span>Used: ${v.used}</span>
                                <span>Available: ${v.avail}</span>
                                <span>Total: ${v.size}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }
            volHtml += '</div>';
            volContainer.innerHTML = volHtml;
        } else {
            volContainer.innerHTML = '<div class="text-muted">No volumes configured.</div>';
        }

        const container = document.getElementById('path-sections');
        if (!data.sections || data.sections.length === 0) {
            container.innerHTML = '<div class="text-muted">No disk paths configured.</div>';
        }

        let html = '';
        for (const sec of data.sections) {
            if (!sec.exists) {
                html += `<div class="section-header">${sec.label}</div>
                <div class="card mb-4"><div class="card-body text-muted">Path not found: <code>${sec.path}</code></div></div>`;
                continue;
            }

            const maxBytes = sec.subdirs.length
                ? Math.max(...sec.subdirs.map(d => d.size_bytes))
                : 1;

            let rows = '';
            for (const dir of sec.subdirs) {
                const pct = maxBytes > 0 ? Math.round((dir.size_bytes / maxBytes) * 100) : 0;
                rows += `
                <tr>
                    <td style="font-family:monospace;font-size:0.82rem">${dir.name}</td>
                    <td style="width:35%">
                        <div class="subdir-bar"><div class="subdir-bar-fill" style="width:${pct}%"></div></div>
                    </td>
                    <td class="text-end" style="font-size:0.82rem;white-space:nowrap">${dir.size}</td>
                    <td class="text-end text-muted" style="font-size:0.78rem">${dir.files} files</td>
                </tr>`;
            }

            const headerHtml = `
                <span><code style="font-size:0.78rem">${sec.path}</code></span>
                <span class="text-muted" style="font-size:0.78rem">${sec.total_size} &nbsp;·&nbsp; ${sec.total_files} files</span>`;

            const bodyHtml = rows.length ? `
                <table class="table table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Folder</th>
                            <th>Size</th>
                            <th class="text-end">Total</th>
                            <th class="text-end">Files</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>` : '<div class="px-3 py-3 text-muted">Directory is empty.</div>';

            html += `<div class="section-header">${sec.label}</div>`;
            html += collapsible(headerHtml, bodyHtml);
        }
        container.innerHTML = html;

        // Render PostgreSQL section
        const pgContainer = document.getElementById('postgres-section');
        const pg = data.postgres;
        if (!pg) {
            pgContainer.innerHTML = '';
        } else if (!pg.available) {
            pgContainer.innerHTML = `
            <div class="section-header">PostgreSQL</div>
            <div class="card mb-4"><div class="card-body text-muted">
                Could not connect to PostgreSQL: <code>${pg.error || 'unknown error'}</code>
            </div></div>`;
        } else if (!pg.databases || pg.databases.length === 0) {
            pgContainer.innerHTML = `
            <div class="section-header">PostgreSQL</div>
            <div class="card mb-4"><div class="card-body text-muted">No user databases found.</div></div>`;
        } else {
            let pgHtml = '<div class="section-header">PostgreSQL</div>';
            for (const db of pg.databases) {
                const maxBytes = db.tables.length ? Math.max(...db.tables.map(t => t.size_bytes)) : 1;
                let tableRows = '';
                for (const tbl of db.tables) {
                    const pct = maxBytes > 0 ? Math.round((tbl.size_bytes / maxBytes) * 100) : 0;
                    tableRows += `
                    <tr>
                        <td style="font-family:monospace;font-size:0.82rem">${tbl.name}</td>
                        <td style="width:35%">
                            <div class="subdir-bar"><div class="subdir-bar-fill" style="width:${pct}%"></div></div>
                        </td>
                        <td class="text-end" style="font-size:0.82rem;white-space:nowrap">${tbl.size}</td>
                    </tr>`;
                }

                const headerHtml = `
                    <span style="font-weight:600">${db.name}</span>
                    <span class="text-muted" style="font-size:0.78rem">&nbsp;·&nbsp; ${db.size} total</span>`;

                const bodyHtml = tableRows ? `
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Table</th>
                                <th>Size</th>
                                <th class="text-end">Total (incl. indexes)</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>` : '<div class="px-3 py-3 text-muted">No tables found.</div>';

                pgHtml += collapsible(headerHtml, bodyHtml);
            }
            pgContainer.innerHTML = pgHtml;
        }
    } catch (err) {
        document.getElementById('path-sections').innerHTML =
            `<div class="text-danger">Failed to load: ${err.message}</div>`;
    }
}

loadDisk();
</script>

<style>
.collapse-chevron {
    transition: transform 0.2s;
    font-size: 0.75rem;
}
[aria-expanded="true"] .collapse-chevron {
    transform: rotate(90deg);
}
</style>
{% endblock %}
